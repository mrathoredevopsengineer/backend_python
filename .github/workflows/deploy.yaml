name: Deploy Backend

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: ACR Login
      run: az acr login --name backendacr

    - name: Build Image
      run: |
        docker build -t backendacr.azurecr.io/backend:${{ github.sha }} .

    - name: Push Image
      run: |
        docker push backendacr.azurecr.io/backend:${{ github.sha }}

